services:
  # --- MESSAGING: Kafka 4.1.1 (KRaft) ---
  kafka-1:
    image: apache/kafka:4.1.1
    container_name: kafka-1
    profiles: ["kafka"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      # Rozdzielone porty: 9092 (Host), 19092 (Docker), 29093 (Kontroler KRaft)
      KAFKA_LISTENERS: 'EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'EXTERNAL://kafka-1:9092,INTERNAL://kafka-1:19092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_IN_SYNC_REPLICAS: 2
      KAFKA_CONTROLLER_QUORUM_ELECTION_TIMEOUT_MS: 10000
      KAFKA_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS: 10000
    ports:
      - "9092:9092"
    volumes:
      - kafka_data_1:/var/lib/kafka/data
      - ./shared_workspace:/opt/workspace

  kafka-2:
    image: apache/kafka:4.1.1
    container_name: kafka-2
    profiles: ["kafka"]
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'EXTERNAL://0.0.0.0:9093,INTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'EXTERNAL://kafka-2:9093,INTERNAL://kafka-2:19092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_IN_SYNC_REPLICAS: 2
      KAFKA_CONTROLLER_QUORUM_ELECTION_TIMEOUT_MS: 10000
      KAFKA_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS: 10000
    ports:
      - "9093:9093"
    volumes:
      - kafka_data_2:/var/lib/kafka/data
      - ./shared_workspace:/opt/workspace

  kafka-3:
    image: apache/kafka:4.1.1
    container_name: kafka-3
    profiles: ["kafka"]
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'EXTERNAL://0.0.0.0:9094,INTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'EXTERNAL://kafka-3:9094,INTERNAL://kafka-3:19092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_IN_SYNC_REPLICAS: 2
      KAFKA_CONTROLLER_QUORUM_ELECTION_TIMEOUT_MS: 10000
      KAFKA_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS: 10000
    ports:
      - "9094:9094"
    volumes:
      - kafka_data_3:/var/lib/kafka/data
      - ./shared_workspace:/opt/workspace

  # --- KAFKA MANAGEMENT UI ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8085:8080"
    profiles: ["kafka"]
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: 'lab-cluster'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka-1:9092,kafka-2:9093,kafka-3:9094'
      KAFKA_CLUSTERS_0_KSQLDBSERVER: 'http://ksqldb-server:8088'

  # --- STREAMING SQL: ksqlDB ---
  ksqldb-server:
    image: confluentinc/ksqldb-server:latest
    container_name: ksqldb-server
    profiles: ["kafka"]
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    ports:
      - "8088:8088"
    environment:
      KSQL_LISTENERS: "http://0.0.0.0:8088"
      KSQL_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9093,kafka-3:9094"
      KSQL_KSQL_SERVICE_ID: "ksqldb_lab_1"
      KSQL_KSQL_STREAMS_REPLICATION_FACTOR: 3
      KSQL_KSQL_INTERNAL_TOPIC_REPLICAS: 3
      KSQL_KSQL_LOGGING_PROCESSING_STREAM_AUTO_CREATE: "true"
      KSQL_KSQL_LOGGING_PROCESSING_TOPIC_AUTO_CREATE: "true"
      KSQL_KSQL_LOGGING_PROCESSING_TOPIC_REPLICATION_FACTOR: 3
      # Pozwala na automatyczne tworzenie tematów, jeśli nie istnieją
      KSQL_KSQL_SINK_REPLICAS: 3
      # Integracja z UI (opcjonalnie)
      KSQL_ACCESS_CONTROL_ALLOW_ORIGIN: "*"
      KSQL_ACCESS_CONTROL_ALLOW_METHODS: "GET,POST,PUT,DELETE,OPTIONS"

  ksqldb-cli:
    image: confluentinc/ksqldb-cli:latest
    container_name: ksqldb-cli
    profiles: ["kafka"]
    depends_on:
      - ksqldb-server
    entrypoint: /bin/sh
    tty: true

  # --- STORAGE: MinIO (S3 API) ---
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 admin password) do echo 'Czekam na MinIO...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/spark-logs;
      /usr/bin/mc mb --ignore-existing local/spark-warehouse;
      /usr/bin/mc mb --ignore-existing local/spark-checkpoints;
      /usr/bin/mc anonymous set download local/spark-logs;
      exit 0;
      "

  mysql:
    image: mysql:9.5
    container_name: mysql
    hostname: mysql
    environment:
      MYSQL_ROOT_PASSWORD: jupyter
      MYSQL_DATABASE: lab_db
    command: >
      --lower_case_table_names=1
      --explicit_defaults_for_timestamp=1
      --max_connections=512
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./conf/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    restart: no

  # --- ANALITYKA (Profil: jupyter) ---
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: jupyterlab
    profiles: ["jupyter"]
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - PYSPARK_PYTHON=python3
      - NB_UID=1000
      - NB_GID=1000
      - CHOWN_HOME=yes      
      - JUPYTER_TOKEN=password
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=python3      
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./lib-shared:/home/jovyan/lib-shared
      - ./conf/spark:/opt/spark/conf

  # --- STREAMING: Apache Flink 2.1.1 (Java 21) ---
  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: flink-jobmanager
    profiles: ["flink"]
    ports:
      - "8081:8081"
    command: jobmanager
    volumes:
      - ./lib-shared:/opt/flink/lib/shared
      - ./shared_workspace:/opt/workspace
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        s3.endpoint: http://minio:9000
        s3.access-key: admin
        s3.secret-key: password
        s3.path.style.access: true

  flink-taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    profiles: ["flink"]
    depends_on:
      - flink-jobmanager
    command: taskmanager
    volumes:
      - ./lib-shared:/opt/flink/lib/shared
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4

  # --- BATCH/STREAMING: Apache Spark ---
  spark-common:
    build:
      context: .
      dockerfile: Dockerfile.spark.${SPARK_VERSION}
    image: spark-image:${SPARK_VERSION}
    container_name: spark-common
    profiles: ["spark"] 
    entrypoint: ["echo", "Service image is ready"] # nie robi nic, tylko kończy działanie


  spark-master:
    image: spark-image:${SPARK_VERSION}
    container_name: spark-master
    profiles: ["spark"]
    depends_on:
      spark-common:
        condition: service_completed_successfully
    ports:
      - "5050:4040"
      - "5051:4041"
      - "8080:8080"
      - "7077:7077"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - ./shared_workspace:/opt/workspace
      - ./conf/spark:/opt/spark/conf
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=python3         

  spark-worker:
    image: spark-image:${SPARK_VERSION}
    profiles: ["spark"]
    depends_on:
      spark-master: 
        condition: service_started
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./conf/spark:/opt/spark/conf
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=8G
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=python3    

  # --- SPARK CONNECT SERVER w trybie Standalone ---
  spark-connect:
    image: spark-image:${SPARK_VERSION}
    container_name: spark-connect
    profiles: ["spark"]
    depends_on:
      spark-master: 
        condition: service_started
    ports:
      - "15002:15002"   # Spark Connect port
      - "4040:4040"     # UI drivera
    environment:
      - SPARK_MODE=connect
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=python3
    command: >
      /opt/spark/bin/spark-submit
      --class org.apache.spark.sql.connect.service.SparkConnectServer
      --master spark://spark-master:7077
      --packages org.apache.spark:spark-sql-kafka-0-10_2.13:${SPARK_VERSION:-4.1.1}
      spark-internal
    volumes:
      - ./conf/spark:/opt/spark/conf    

  spark-history-server:
    image: spark-image:${SPARK_VERSION}
    container_name: spark-history-server
    profiles: ["spark"]
    depends_on:
      spark-master: 
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    ports:
      - "18080:18080"
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=s3a://spark-logs/
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    volumes:
      - ./conf/spark:/opt/spark/conf

networks:
  default:
    name: stream-net

volumes:
  mysql_data:
  minio_data:
  kafka_data_1:
  kafka_data_2:
  kafka_data_3: